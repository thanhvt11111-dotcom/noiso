<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎈 Học Số Vui Vẻ</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff9f0;
    --card-radius: 28px;
    --shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Baloo 2', cursive;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated sky background */
  .sky {
    position: fixed; inset: 0; z-index: -1;
    background: linear-gradient(180deg, #a8edea 0%, #fed6e3 60%, #fff9f0 100%);
  }
  .cloud {
    position: fixed; border-radius: 50px;
    background: rgba(255,255,255,0.75);
    animation: drift linear infinite;
  }
  .cloud::before, .cloud::after {
    content:''; position:absolute;
    background: inherit; border-radius: 50%;
  }
  @keyframes drift { from { transform: translateX(-200px); } to { transform: translateX(110vw); } }

  /* Header */
  header {
    text-align: center;
    padding: 32px 20px 10px;
  }
  header h1 {
    font-size: clamp(2rem, 6vw, 3.6rem);
    font-weight: 800;
    color: #ff6b6b;
    text-shadow: 3px 3px 0 #ffcc02, 5px 5px 0 rgba(0,0,0,0.08);
    letter-spacing: 1px;
  }
  header p {
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: #7c5cbf;
    margin-top: 6px;
    font-weight: 600;
  }

  /* Score bar */
  .scorebar {
    display: flex; justify-content: center; gap: 20px;
    margin: 14px auto 0;
    flex-wrap: wrap;
  }
  .score-chip {
    background: white;
    border-radius: 50px;
    padding: 8px 22px;
    font-size: 1.1rem;
    font-weight: 800;
    box-shadow: 0 4px 14px rgba(0,0,0,0.1);
    display: flex; align-items: center; gap: 8px;
  }
  .score-chip.stars { color: #f4a400; }
  .score-chip.streak { color: #e84393; }

  /* Game area */
  .game-area {
    max-width: 900px;
    margin: 24px auto;
    padding: 0 16px;
  }

  .level-label {
    text-align: center;
    font-size: 1rem;
    font-weight: 600;
    color: #999;
    margin-bottom: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Card pair container */
  .pair-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(12px, 3vw, 40px);
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .connector {
    font-size: 2.4rem;
    animation: pulse 1.5s ease-in-out infinite;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15));
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }

  /* Cards */
  .card {
    background: white;
    border-radius: var(--card-radius);
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .card:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 16px 40px rgba(0,0,0,0.16); }
  .card:active { transform: scale(0.97); }

  .number-card {
    width: clamp(120px, 22vw, 180px);
    height: clamp(120px, 22vw, 180px);
    border: 5px solid transparent;
  }
  .number-display {
    font-size: clamp(3.5rem, 10vw, 6rem);
    font-weight: 800;
    line-height: 1;
    filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.12));
  }
  .number-word {
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    font-weight: 600;
    color: #888;
    margin-top: 4px;
  }

  .emoji-card {
    width: clamp(160px, 28vw, 240px);
    min-height: clamp(130px, 24vw, 200px);
    padding: 16px 20px;
    border: 5px solid transparent;
    gap: 10px;
  }
  .emoji-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: clamp(3px, 1vw, 7px);
    max-width: 200px;
  }
  .emoji-item {
    font-size: clamp(1.5rem, 3.5vw, 2.2rem);
    line-height: 1;
    animation: popIn 0.4s cubic-bezier(.36,2,.6,.8) both;
  }
  @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

  /* Choices row */
  .choices-label {
    text-align: center;
    font-size: 1rem; font-weight: 700;
    color: #7c5cbf;
    margin: 6px 0 14px;
  }
  .choices {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .choice-btn {
    background: white;
    border: none;
    border-radius: 20px;
    box-shadow: 0 5px 18px rgba(0,0,0,0.12);
    cursor: pointer;
    padding: 12px 18px;
    transition: transform 0.15s, box-shadow 0.15s, border 0.15s;
    font-family: 'Baloo 2', cursive;
    display: flex; flex-direction: column; align-items: center;
    gap: 6px;
    border: 4px solid transparent;
    min-width: 90px;
  }
  .choice-btn:hover { transform: translateY(-5px) scale(1.06); box-shadow: 0 12px 30px rgba(0,0,0,0.15); }
  .choice-emoji { font-size: 2rem; }
  .choice-name { font-size: 0.85rem; font-weight: 700; color: #555; }

  /* Feedback overlay */
  .card.correct  { border-color: #4cde80; box-shadow: 0 0 0 6px rgba(76,222,128,0.3); animation: correctBounce 0.5s; }
  .card.wrong    { border-color: #ff6b6b; animation: shake 0.4s; }
  .choice-btn.correct { border-color: #4cde80; background: #e8fdf0; }
  .choice-btn.wrong   { border-color: #ff6b6b; background: #fff0f0; }

  @keyframes correctBounce { 0%{transform:scale(1)} 40%{transform:scale(1.14)} 70%{transform:scale(0.96)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }

  /* Celebration */
  .celebration {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .celebration.show { opacity: 1; pointer-events: all; }
  .celeb-box {
    background: white;
    border-radius: 32px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: celebPop 0.5s cubic-bezier(.36,2,.6,.8);
  }
  @keyframes celebPop { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  .celeb-emoji { font-size: 4rem; }
  .celeb-text { font-size: 2rem; font-weight: 800; color: #ff6b6b; margin: 8px 0; }
  .celeb-sub  { font-size: 1.2rem; color: #7c5cbf; }
  .next-btn {
    margin-top: 20px;
    background: linear-gradient(135deg, #ff6b6b, #ff9f43);
    color: white; border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-family: 'Baloo 2', cursive;
    font-size: 1.2rem; font-weight: 800;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,107,107,0.4);
    transition: transform 0.15s;
  }
  .next-btn:hover { transform: scale(1.07); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 12px; height: 12px;
    border-radius: 3px;
    pointer-events: none;
    z-index: 200;
    animation: confettiFall 2.5s ease-in forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Progress dots */
  .progress {
    display: flex; justify-content: center; gap: 8px;
    margin: 8px 0 20px;
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #ddd;
    transition: background 0.3s, transform 0.3s;
  }
  .dot.done { background: #4cde80; transform: scale(1.2); }
  .dot.active { background: #ff9f43; transform: scale(1.35); }
</style>
</head>
<body>

<div class="sky" id="sky"></div>

<header>
  <h1>🔢 Học Số Vui Vẻ 🎈</h1>
  <p>Nối số với hình ảnh tương ứng nhé bé ơi!</p>
  <div class="scorebar">
    <div class="score-chip stars">⭐ Điểm: <span id="score">0</span></div>
    <div class="score-chip streak">🔥 Liên tiếp: <span id="streak">0</span></div>
  </div>
</header>

<div class="game-area">
  <div class="level-label" id="level-label">Câu hỏi 1 / 10</div>

  <div class="progress" id="progress"></div>

  <div class="pair-container" id="pair-container">
    <!-- Number card -->
    <div class="card number-card" id="num-card">
      <div class="number-display" id="num-display">🔢</div>
      <div class="number-word" id="num-word"></div>
    </div>

    <div class="connector">↔️</div>

    <!-- Emoji card (answer shown after correct) -->
    <div class="card emoji-card" id="emoji-card" style="opacity:0.2;pointer-events:none;">
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
  </div>

  <div class="choices-label">👇 Chọn hình ảnh đúng nào!</div>
  <div class="choices" id="choices"></div>
</div>

<!-- Celebration modal -->
<div class="celebration" id="celebration">
  <div class="celeb-box">
    <div class="celeb-emoji" id="celeb-emoji">🎉</div>
    <div class="celeb-text" id="celeb-text">Tuyệt vời!</div>
    <div class="celeb-sub" id="celeb-sub">Con giỏi lắm!</div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Câu tiếp theo ▶</button>
  </div>
</div>

<script>
// ===== DATA =====
const NUMBERS = [
  { n: 1, word: "Một",  emoji: "🍎", name: "Quả táo" },
  { n: 2, word: "Hai",  emoji: "🦋", name: "Con bướm" },
  { n: 3, word: "Ba",   emoji: "⭐", name: "Ngôi sao" },
  { n: 4, word: "Bốn",  emoji: "🌸", name: "Bông hoa" },
  { n: 5, word: "Năm",  emoji: "🐟", name: "Con cá" },
  { n: 6, word: "Sáu",  emoji: "🐝", name: "Con ong" },
  { n: 7, word: "Bảy",  emoji: "☂️", name: "Cái dù" },
  { n: 8, word: "Tám",  emoji: "🍉", name: "Quả dưa" },
  { n: 9, word: "Chín", emoji: "🚗", name: "Xe ô tô" },
  { n:10, word: "Mười", emoji: "🎈", name: "Bóng bay" },
];

const COLORS = [
  ["#ff6b6b","#ff9f43"],["#a29bfe","#6c5ce7"],["#55efc4","#00b894"],
  ["#fdcb6e","#e17055"],["#74b9ff","#0984e3"],["#fd79a8","#e84393"],
  ["#00cec9","#00b894"],["#e17055","#d63031"],["#6c5ce7","#a29bfe"],
  ["#f9ca24","#f0932b"]
];

// ===== STATE =====
let questions = [];
let current = 0;
let score = 0;
let streak = 0;
let answered = false;
const TOTAL = 10;

// ===== INIT =====
function buildClouds() {
  const sky = document.getElementById('sky');
  for (let i = 0; i < 5; i++) {
    const c = document.createElement('div');
    c.className = 'cloud';
    const w = 80 + Math.random()*120, h = 30 + Math.random()*30;
    c.style.cssText = `width:${w}px;height:${h}px;top:${5+Math.random()*35}%;
      left:-${w+20}px;animation-duration:${20+Math.random()*25}s;
      animation-delay:-${Math.random()*30}s;opacity:${0.5+Math.random()*0.4}`;
    c.style.setProperty('--after-w', (w*0.6)+'px');
    sky.appendChild(c);
  }
}

function buildQuestions() {
  const shuffled = [...NUMBERS].sort(() => Math.random()-0.5).slice(0, TOTAL);
  questions = shuffled.map(item => {
    // Pick 3 wrong choices
    const wrong = NUMBERS.filter(n => n.n !== item.n).sort(() => Math.random()-0.5).slice(0, 3);
    const choices = [...wrong, item].sort(() => Math.random()-0.5);
    return { correct: item, choices };
  });
}

function buildProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < current ? ' done' : i === current ? ' active' : '');
    el.appendChild(d);
  }
}

function renderQuestion() {
  if (current >= TOTAL) { showFinalScreen(); return; }
  answered = false;
  const q = questions[current];
  const item = q.correct;
  const [c1, c2] = COLORS[current % COLORS.length];

  document.getElementById('level-label').textContent = `Câu hỏi ${current+1} / ${TOTAL}`;
  buildProgress();

  // Number card
  const numCard = document.getElementById('num-card');
  numCard.className = 'card number-card';
  numCard.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
  document.getElementById('num-display').textContent = item.n;
  document.getElementById('num-display').style.color = 'white';
  document.getElementById('num-word').textContent = item.word;
  document.getElementById('num-word').style.color = 'rgba(255,255,255,0.85)';

  // Emoji card (hidden until answered)
  const emojiCard = document.getElementById('emoji-card');
  emojiCard.className = 'card emoji-card';
  emojiCard.style.opacity = '0.2';
  emojiCard.style.pointerEvents = 'none';
  emojiCard.style.background = 'white';

  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  for (let i = 0; i < item.n; i++) {
    const span = document.createElement('span');
    span.className = 'emoji-item';
    span.textContent = item.emoji;
    span.style.animationDelay = (i * 0.06) + 's';
    grid.appendChild(span);
  }

  // Choices
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-emoji">${choice.emoji}</span>
                     <span class="choice-name">${choice.name}</span>`;
    btn.onclick = () => handleChoice(choice, btn);
    choicesEl.appendChild(btn);
  });
}

function handleChoice(choice, btn) {
  if (answered) return;
  answered = true;

  const isCorrect = choice.n === questions[current].correct.n;

  if (isCorrect) {
    score += (10 + streak * 2);
    streak++;
    btn.classList.add('correct');

    // Reveal emoji card
    const emojiCard = document.getElementById('emoji-card');
    emojiCard.style.opacity = '1';
    emojiCard.style.pointerEvents = 'all';
    emojiCard.classList.add('correct');

    document.getElementById('score').textContent = score;
    document.getElementById('streak').textContent = streak;

    setTimeout(() => {
      spawnConfetti();
      showCelebration(true);
    }, 400);
  } else {
    streak = 0;
    btn.classList.add('wrong');
    document.getElementById('streak').textContent = streak;

    // Highlight correct
    const allBtns = document.querySelectorAll('.choice-btn');
    allBtns.forEach(b => {
      const name = b.querySelector('.choice-name').textContent;
      if (name === questions[current].correct.name) b.classList.add('correct');
    });

    setTimeout(() => showCelebration(false), 600);
  }
}

function showCelebration(correct) {
  const messages = correct
    ? [["🎉","Tuyệt vời!","Con thông minh lắm! ⭐"],
       ["🌟","Giỏi quá!","Con học rất nhanh! 🥳"],
       ["🦄","Xuất sắc!","Con là thiên tài! 🎊"],
       ["🎈","Đúng rồi!","Cố lên con nha! 💪"]]
    : [["🤔","Cố lên nào!","Lần sau con sẽ đúng thôi! 😊"],
       ["💡","Không sao!","Con học tiếp nhé! 🌈"]];

  const m = messages[Math.floor(Math.random()*messages.length)];
  document.getElementById('celeb-emoji').textContent = m[0];
  document.getElementById('celeb-text').textContent = m[1];
  document.getElementById('celeb-sub').textContent = m[2];
  document.getElementById('celebration').classList.add('show');
}

function nextQuestion() {
  document.getElementById('celebration').classList.remove('show');
  current++;
  setTimeout(renderQuestion, 200);
}

function showFinalScreen() {
  const stars = score >= 80 ? '⭐⭐⭐' : score >= 50 ? '⭐⭐' : '⭐';
  document.getElementById('celeb-emoji').textContent = '🏆';
  document.getElementById('celeb-text').textContent = `Điểm: ${score} / ${TOTAL * 10}`;
  document.getElementById('celeb-sub').textContent = `${stars} Con học rất giỏi!`;
  document.getElementById('next-btn').textContent = '🔄 Chơi lại';
  document.getElementById('next-btn').onclick = restartGame;
  document.getElementById('celebration').classList.add('show');
  spawnConfetti(60);
}

function restartGame() {
  score = 0; streak = 0; current = 0;
  document.getElementById('score').textContent = 0;
  document.getElementById('streak').textContent = 0;
  document.getElementById('next-btn').textContent = 'Câu tiếp theo ▶';
  document.getElementById('next-btn').onclick = nextQuestion;
  document.getElementById('celebration').classList.remove('show');
  buildQuestions();
  renderQuestion();
}

function spawnConfetti(count = 40) {
  const colors = ['#ff6b6b','#ffcc02','#a29bfe','#55efc4','#74b9ff','#fd79a8','#fdcb6e'];
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left: ${Math.random()*100}vw;
      top: -20px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      transform: rotate(${Math.random()*360}deg);
      animation-delay: ${Math.random()*1.2}s;
      width: ${8+Math.random()*12}px;
      height: ${8+Math.random()*12}px;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3500);
  }
}

// ===== START =====
buildClouds();
buildQuestions();
renderQuestion();
</script>
</body>
</html>
